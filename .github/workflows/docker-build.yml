name: Build and Push Docker Image

on:
  # 监听代码推送事件 (包含自动同步产生的新提交)
  push:
    branches: [ "main", "master" ]
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 清理磁盘空间 (ARM 构建必备)
      - name: Free Disk Space (Manual)
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "After cleanup:"
          df -h

      # 2. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. 设置 QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. 【核心】替换模型文件 (使用 Release 下载方案)
      - name: Replace Stub with Real Model
        run: |
          # 目标路径
          TARGET_DIR="./backend/embedding/models--sentence-transformers--paraphrase-multilingual-MiniLM-L12-v2/snapshots/86741b4e3f5cb7765a600d3a3d55a0f6a6cb443d"
          TARGET_FILE="$TARGET_DIR/model.safetensors"
          
          # 你的 GitHub Release 下载地址
          DOWNLOAD_URL="https://github.com/WFeeng/MuMuAINovel/releases/download/v1.0-model/model.safetensors"
          
          echo "目标路径: $TARGET_DIR"
          mkdir -p "$TARGET_DIR"
          
          echo "正在从 GitHub Release 下载并覆盖..."
          wget -q -O "$TARGET_FILE" "$DOWNLOAD_URL"
          
          echo "替换完成！当前文件大小:"
          ls -lh "$TARGET_FILE"

      # 6. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mumuainovel:latest
